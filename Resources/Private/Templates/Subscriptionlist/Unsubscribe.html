<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers" data-namespace-typo3-fluid="true">
<f:layout name="Default"/>
<f:section name="content">
    <f:form action="rest" name="subscription" class="laposta-form laposta-unsubscribe" id="laposta-form">
        <f:render partial="FlashMessages"/>

        <fieldset>
            <legend class="assistive"><f:translate key="tx_laposta.legend"/></legend>

            <f:if condition="{lists}">
                <f:then>
                    <p class="laposta-required-hint"><f:translate key="tx_laposta.requiredHint"/></p>

                    <div class="form-group">
                        <div class="assistive" aria-hidden="true">
                            <label class="form-check-label" for="tx_laposta-important">{f:translate(key:'tx_laposta.honey')}</label>
                            <f:form.textfield name="laposta.important" class="form-control" id="tx_laposta-important"
                                              additionalAttributes="{tabindex: '-1', autocomplete: 'off'}"/>
                        </div>

                        <f:for each="{lists}" as="list" iteration="iterator">
                            <div class="form-check">
                                <f:form.checkbox name="list_{iterator.cycle}" value="{list.uid}" id="list_{iterator.cycle}"
                                                 class="form-check-input"/>
                                <label class="form-check-label" for="list_{iterator.cycle}">{list.listLabel}</label>
                            </div>
                        </f:for>
                    </div>

                    <div class="form-group">
                        <label class="form-check-label" for="tx_laposta-email">
                            {f:translate(key:'tx_laposta.email')}
                            <abbr class="icon required" title="{f:translate(key:'tx_laposta.required')}">*</abbr>
                        </label>
                        <f:form.textfield name="email" type="email" class="form-control" id="tx_laposta-email"
                                          additionalAttributes="{autocomplete: 'email'}" required="1"/>
                    </div>

                    <f:form.hidden name="numberOfLists" value="{f:count(subject: lists)}"/>
                    <f:form.hidden name="crudAction" value="delete"/>
                    <f:form.submit value="{f:translate(key:'tx_laposta.unsubscribe')}" class="btn btn-primary"/>
                </f:then>
                <f:else>
                    <p class="laposta-no-lists"><f:translate key="tx_laposta.noLists"/></p>
                </f:else>
            </f:if>
        </fieldset>
    </f:form>
</f:section>
</html>
